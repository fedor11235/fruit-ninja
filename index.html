<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Fruit Ninja</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="score">0</div>
    <div id="combo"></div>
    <div id="lives"></div>
  </div>

  <div id="overlay">
    <div class="panel">
      <h1>🍉 Fruit Ninja</h1>
      <p id="overlay-text">Режь фрукты свайпом. Не задевай бомбы 💣 и не роняй фрукты!</p>
      <p id="best"></p>
      <button id="start-btn">Играть</button>
    </div>
  </div>

  <script>
    // Грузим Yandex SDK (/sdk.js отдаёт хостинг Яндекс Игр);
    // если его нет (локальный запуск) — игра стартует автономно.
    (function () {
      function loadGame() {
        var s = document.createElement('script');
        s.src = 'game.js';
        document.body.appendChild(s);
      }
      var s = document.createElement('script');
      s.src = '/sdk.js';
      s.onload = loadGame;
      s.onerror = function () {
        window.__ysdkFailed = true;
        loadGame();
      };
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
